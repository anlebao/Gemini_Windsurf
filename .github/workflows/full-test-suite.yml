name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - integration
          - e2e
          - load
  schedule:
    # Chạy hàng tuần vào Chủ nhật lúc 2:00 AM UTC (9:00 AM VN)
    - cron: '0 2 * * 0'

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Integration Tests
  integration-tests:
    if: |
      github.event.inputs.test_type == 'all' || 
      github.event.inputs.test_type == 'integration' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}

      - name: Restore & Build
        run: |
          dotnet restore VanAn.sln
          dotnet build VanAn.sln --no-restore --configuration Release

      - name: Integration Tests
        run: dotnet test 6_Tests/VanAn.Integration.Tests/ --configuration Release --verbosity normal --logger trx

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/TestResults/*.trx'
          retention-days: 30

  # Job 2: E2E Tests
  e2e-tests:
    if: |
      github.event.inputs.test_type == 'all' || 
      github.event.inputs.test_type == 'e2e' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}

      - name: Restore & Build
        run: |
          dotnet restore VanAn.sln
          dotnet build VanAn.sln --no-restore --configuration Release

      - name: Publish ShopERP
        run: dotnet publish 5_WebApps/ShopERP/VanAn.ShopERP.csproj --no-build --configuration Release --output ./artifacts/shoperp

      - name: Publish Gateway
        run: dotnet publish 2_Gateway/VanAn.Gateway.csproj --no-build --configuration Release --output ./artifacts/gateway

      - name: Install Playwright
        working-directory: 6_Testing
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start Services
        run: |
          dotnet ./artifacts/gateway/VanAn.Gateway.dll &
          dotnet ./artifacts/shoperp/VanAn.ShopERP.dll &

      - name: Wait for Services
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:5001/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -sf http://localhost:5003/health; do sleep 2; done'

      - name: Run E2E Tests
        working-directory: 6_Testing
        run: npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:5003

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            6_Testing/playwright-report/
            6_Testing/test-results/
          retention-days: 30

  # Job 3: Load Tests
  load-tests:
    if: |
      github.event.inputs.test_type == 'all' || 
      github.event.inputs.test_type == 'load' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}

      - name: Restore & Build
        run: |
          dotnet restore VanAn.sln
          dotnet build VanAn.sln --no-restore --configuration Release

      - name: Load Tests
        run: dotnet test 6_Tests/VanAn.Load.Tests/ --configuration Release --verbosity normal --logger trx

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: '**/TestResults/*.trx'
          retention-days: 30

  # Job 4: Summary
  test-summary:
    runs-on: ubuntu-latest
    needs: [integration-tests, e2e-tests, load-tests]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Full Test Suite Summary
        run: |
          echo "## Full Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Type:** ${{ github.event.inputs.test_type || 'all (scheduled)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Load Tests: ${{ needs.load-tests.result }}" >> $GITHUB_STEP_SUMMARY
