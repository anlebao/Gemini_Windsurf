name: CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.windsurf/**'
  pull_request:
    branches: [ main, develop, 'align-consumer-phase4' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.windsurf/**'

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'VanAn.sln'

jobs:
  # Job 1: Build và Unit Tests
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Unit Tests - Core
        run: dotnet test 6_Tests/VanAn.Core.Tests/ --no-build --verbosity normal --logger trx
        
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit
          path: '**/TestResults/*.trx'
          retention-days: 30

  # Job 2: Architecture Tests
  architecture-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Architecture Tests
        run: dotnet test 6_Tests/VanAn.Architecture.Tests/ --no-build --configuration Release --verbosity normal --logger trx
        
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-architecture
          path: '**/TestResults/*.trx'
          retention-days: 30

  # Job 3: Guard Check (Windows-only)
  guard-check:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Run Guard Check
        shell: pwsh
        run: ./guard-check.ps1
        
      - name: Upload Guard Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guard-check-results
          path: 'guard-*.txt'
          retention-days: 30

  # Job 4: Code Quality (Optional)
  code-quality:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release
        
      - name: Format Check
        run: echo "Format check skipped - collection expression rewrite causes CS0173 on Linux CI"
